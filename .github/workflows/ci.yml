name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install base deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]
      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q
      - name: Run local smoke
        env:
          PYTHONPATH: src
        run: python -m hybrid_qaoa_portfolio.cli --mode smoke --runtime-mode local_proxy --output-prefix ci_smoke
